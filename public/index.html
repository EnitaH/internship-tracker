<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Internship Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="section">
      <h1>Internship Tracker</h1>
      <h2>Add New Application</h2>

      <form id="internshipForm" novalidate>
        <input type="text" id="company" placeholder="Company Name">
        <input type="text" id="role" placeholder="Role">

        <select id="status">
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>

        <input type="text" id="location" placeholder="Location">
        <div class="input-group">
            <label for="date_applied">Date Applied</label>
            <input type="date" id="date_applied">
        </div>

        <div class="input-group">
            <label for="deadline">Application Deadline</label>
            <input type="date" id="deadline">
        </div>
    <textarea id="notes" placeholder="Notes"></textarea>

    <div id="formMessage" class="form-message hidden"></div>

<div class="form-actions">
    <button type="submit">Add Internship</button>
    <button type="button" id="cancelEditBtn" class="cancel-btn">Cancel</button>
</div>
      </form>
    </div>
<div class="section">
  <h2>Your Applications</h2>

  <div class="stats-grid">
    <div class="stat-card">
      <p class="stat-label">Total</p>
      <h3 id="totalCount">0</h3>
    </div>

    <div class="stat-card">
      <p class="stat-label">Applied</p>
      <h3 id="appliedCount">0</h3>
    </div>

    <div class="stat-card">
      <p class="stat-label">Interview</p>
      <h3 id="interviewCount">0</h3>
    </div>

    <div class="stat-card">
      <p class="stat-label">Offer</p>
      <h3 id="offerCount">0</h3>
    </div>

    <div class="stat-card">
      <p class="stat-label">Rejected</p>
      <h3 id="rejectedCount">0</h3>
    </div>
  </div>

  <div class="filters">
    <input
      type="text"
      id="searchInput"
      placeholder="Search by company or role"
    >

    <select id="statusFilter">
      <option value="All">All</option>
      <option value="Applied">Applied</option>
      <option value="Interview">Interview</option>
      <option value="Offer">Offer</option>
      <option value="Rejected">Rejected</option>
    </select>

  <select id="sortFilter">
    <option value="newest">Newest First</option>
    <option value="oldest">Oldest First</option>
    <option value="az">Company A-Z</option>
  </select>
  </div>
  
<div id="internshipList"></div>

<div class="bottom-actions">
  <button type="button" id="exportCsvBtn" class="export-btn">
    Export CSV
  </button>
</div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>

</body>
</html>
